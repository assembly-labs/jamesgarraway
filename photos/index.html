<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Private Page">
  <title>Photos</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noodp, noimageindex, notranslate">
  <meta name="googlebot" content="noindex, nofollow">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="color-scheme" content="dark light" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="/styles/navigation.css?v=1763735221&bust=v5">
  <link rel="stylesheet" href="/styles/gallery.css?v=1763735221&bust=v5">
  <style>
    /* nav sits above slideshow */
    body { overflow: hidden; }
    .slideshow-container { padding-top: 0; }

    /* caption overlay on each slide */
    .slide-caption {
      position: absolute;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
      white-space: nowrap;
      pointer-events: none;
    }

    /* placeholder when no manifest */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: rgba(255,255,255,0.25);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      gap: 12px;
    }
    .empty-state .icon { font-size: 48px; opacity: 0.3; }
    .empty-state p {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin: 0;
    }
  </style>
</head>
<body>
  <nav class="sticky-nav" id="stickyNav">
    <div class="nav-container">
      <button class="nav-hamburger" id="navHamburger" aria-label="Menu">&#9776;</button>
      <div class="nav-brand" id="navBrand">PHOTOS</div>
      <ul class="nav-menu" id="navMenu">
        <li><a href="/" class="nav-link" data-page="champion">CHAMPION ROUTINE</a></li>
        <li><a href="/photos/"   class="nav-link" data-page="photos">PHOTOS</a></li>
        <li><a href="/weather/"  class="nav-link" data-page="weather">WEATHER</a></li>
        <li><a href="/schedule/" class="nav-link" data-page="schedule">SCHEDULE</a></li>
      </ul>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <script src="/js/auth-guard.js?v=1763735221&bust=v5"></script>

  <div id="app"></div>

  <script src="/js/navigation.js?v=1763735221&bust=v5"></script>
  <script>
  (function() {
    var autoPlayDelay = 5000;
    var currentSlide = 0;
    var autoPlayInterval, progressInterval;
    var slides, dotsContainer, totalSlides;

    // ── confetti ──────────────────────────────────────────────
    var confettiColors = ['#FF0000','#0000FF','#FFD700','#00FF00','#9370DB','#FF8C00','#FF69B4'];
    function rnd(a,b){return Math.random()*(b-a)+a;}
    function triggerConfetti() {
      var w=window.innerWidth, h=window.innerHeight;
      for(var i=0;i<200;i++){
        var p=document.createElement('div');
        p.className='confetti-piece';
        p.style.left=rnd(0,w)+'px';
        p.style.top=rnd(-500,-50)+'px';
        p.style.backgroundColor=confettiColors[Math.floor(Math.random()*confettiColors.length)];
        p.style.animationDelay=rnd(0,1)+'s';
        var s=rnd(12,25); p.style.width=s+'px'; p.style.height=s+'px';
        p.style.setProperty('--rotation',rnd(0,360)+'deg');
        p.style.setProperty('--end-rotation',rnd(360,1080)+'deg');
        p.style.setProperty('--drift-x',rnd(-200,200)+'px');
        document.body.appendChild(p);
        setTimeout(function(){p.remove();},4500);
      }
    }

    // ── dots ──────────────────────────────────────────────────
    function createDots() {
      dotsContainer.innerHTML = '';
      for(var i=0;i<totalSlides;i++){
        var dot=document.createElement('div');
        dot.className='dot'+(i===0?' active':'');
        var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        svg.classList.add('progress-ring');
        var circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
        circle.classList.add('progress-ring-circle');
        circle.setAttribute('cx','28'); circle.setAttribute('cy','28'); circle.setAttribute('r','26');
        svg.appendChild(circle);
        var inner=document.createElement('div');
        inner.className='dot-inner';
        dot.appendChild(svg); dot.appendChild(inner);
        (function(idx){dot.addEventListener('click',function(){goToSlide(idx);});})(i);
        dotsContainer.appendChild(dot);
      }
    }
    function updateDots() {
      var dots=document.querySelectorAll('.dot');
      dots.forEach(function(d,i){d.classList.toggle('active',i===currentSlide);});
    }
    function animateProgress() {
      var activeDot=document.querySelector('.dot.active');
      if(!activeDot) return;
      var circle=activeDot.querySelector('.progress-ring-circle');
      var circumference=164, progress=0;
      var step=100/(autoPlayDelay/50);
      clearInterval(progressInterval);
      circle.style.strokeDashoffset=circumference;
      progressInterval=setInterval(function(){
        progress+=step;
        if(progress>=100){progress=100;clearInterval(progressInterval);}
        circle.style.strokeDashoffset=circumference-(progress/100)*circumference;
      },50);
    }

    // ── slide navigation ──────────────────────────────────────
    function showSlide(index) {
      slides.forEach(function(s,i){s.classList.toggle('active',i===index);});
      currentSlide=index;
      updateDots();
      triggerConfetti();
      animateProgress();
    }
    function nextSlide(){showSlide((currentSlide+1)%totalSlides);resetAutoPlay();}
    function prevSlide(){showSlide((currentSlide-1+totalSlides)%totalSlides);resetAutoPlay();}
    function goToSlide(i){if(i!==currentSlide){showSlide(i);resetAutoPlay();}}
    function startAutoPlay(){autoPlayInterval=setInterval(nextSlide,autoPlayDelay);animateProgress();}
    function stopAutoPlay(){clearInterval(autoPlayInterval);clearInterval(progressInterval);}
    function resetAutoPlay(){stopAutoPlay();startAutoPlay();}

    // ── touch ──────────────────────────────────────────────────
    var touchStartX=0, touchEndX=0;
    function initTouch(el) {
      el.addEventListener('touchstart',function(e){touchStartX=e.changedTouches[0].screenX;});
      el.addEventListener('touchend',function(e){
        touchEndX=e.changedTouches[0].screenX;
        var diff=touchStartX-touchEndX;
        if(Math.abs(diff)>50){diff>0?nextSlide():prevSlide();}
      });
    }

    // ── keyboard ──────────────────────────────────────────────
    document.addEventListener('keydown',function(e){
      if(e.key==='ArrowLeft') prevSlide();
      else if(e.key==='ArrowRight') nextSlide();
      else if(e.key===' '){e.preventDefault();autoPlayInterval?stopAutoPlay():startAutoPlay();}
    });

    // ── build & init ──────────────────────────────────────────
    function buildCarousel(items) {
      var app = document.getElementById('app');
      app.innerHTML = '';

      // left arrow
      var btnL=document.createElement('div');
      btnL.className='nav-arrow left'; btnL.id='prevBtn';
      btnL.addEventListener('click',prevSlide);
      app.appendChild(btnL);

      // slideshow
      var ss=document.createElement('div');
      ss.className='slideshow-container'; ss.id='slideshow';
      items.forEach(function(item) {
        var slide=document.createElement('div');
        slide.className='slide';
        var img=document.createElement('img');
        img.src='images/'+item.src;
        img.alt=item.caption||item.src;
        img.addEventListener('click',nextSlide);
        slide.appendChild(img);
        if(item.caption){
          var cap=document.createElement('div');
          cap.className='slide-caption';
          cap.textContent=item.caption;
          slide.appendChild(cap);
        }
        ss.appendChild(slide);
      });
      app.appendChild(ss);

      // dots
      dotsContainer=document.createElement('div');
      dotsContainer.className='dots-container'; dotsContainer.id='dots-container';
      app.appendChild(dotsContainer);

      // right arrow
      var btnR=document.createElement('div');
      btnR.className='nav-arrow right'; btnR.id='nextBtn';
      btnR.addEventListener('click',nextSlide);
      app.appendChild(btnR);

      slides=ss.querySelectorAll('.slide');
      totalSlides=slides.length;
      createDots();
      initTouch(ss);
      showSlide(0);
      startAutoPlay();
      setTimeout(triggerConfetti,500);
    }

    function showEmpty() {
      var app=document.getElementById('app');
      app.innerHTML='<div class="empty-state"><div class="icon">+</div><p>Add photos here</p></div>';
    }

    fetch('images/manifest.json?t='+Date.now())
      .then(function(r){return r.ok?r.json():[];})
      .catch(function(){return [];})
      .then(function(items){
        if(!items||items.length===0){showEmpty();}
        else{buildCarousel(items);}
      });
  })();
  </script>
</body>
</html>
