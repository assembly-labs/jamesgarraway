<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Private Page">
  <title>Photos</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noodp, noimageindex, notranslate">
  <meta name="googlebot" content="noindex, nofollow">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="color-scheme" content="dark light" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="../styles/themes.css?v=1763735221&bust=v5">
  <link rel="stylesheet" href="../styles/routine.css?v=1763735221&bust=v5">
  <link rel="stylesheet" href="../styles/navigation.css?v=1763735221&bust=v5">
  <style>
    .photos-header {
      background: var(--primary);
      padding: clamp(20px, 4vw, 30px);
      border-radius: 16px;
      margin-bottom: clamp(15px, 3vw, 25px);
      margin-top: clamp(8px, 2vh, 20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 2px solid rgba(0,0,0,0.1);
      text-align: center;
    }
    .photos-header h1 {
      margin: 0;
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: clamp(12px, 2.5vw, 20px);
      width: 100%;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .photo-card {
      background: var(--cardBg);
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.08);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      /* Trading card ratio: 2.5 : 3.5 */
      aspect-ratio: 2.5 / 3.5;
      display: flex;
      flex-direction: column;
    }
    .photo-card:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 2px var(--accent);
      border-color: var(--accent);
    }

    .photo-card img {
      width: 100%;
      flex: 1;
      object-fit: cover;
      display: block;
      min-height: 0;
    }

    .photo-caption {
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--secondary);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: var(--cardBg);
      flex-shrink: 0;
    }

    /* Placeholder card */
    .photo-card.placeholder {
      border: 2px dashed rgba(255,255,255,0.2);
      cursor: default;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .photo-card.placeholder:hover {
      transform: none;
      box-shadow: none;
      border-color: rgba(255,255,255,0.2);
    }
    .placeholder-icon {
      font-size: 32px;
      opacity: 0.3;
    }
    .placeholder-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--secondary);
      opacity: 0.5;
      text-align: center;
      padding: 0 12px;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .lightbox.open {
      display: flex;
    }
    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
      object-fit: contain;
    }
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--cardBg);
      border: 2px solid rgba(255,255,255,0.15);
      color: var(--text);
      font-size: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2001;
    }
  </style>
</head>
<body>
  <a href="#header" class="skip-nav">Skip to main content</a>

  <nav class="sticky-nav" id="stickyNav">
    <div class="nav-container">
      <button class="nav-hamburger" id="navHamburger" aria-label="Menu">&#9776;</button>
      <div class="nav-brand" id="navBrand">PHOTOS</div>
      <ul class="nav-menu" id="navMenu">
        <li><a href="/" class="nav-link" data-page="champion">CHAMPION ROUTINE</a></li>
        <li><a href="/flagfootball/" class="nav-link" data-page="flagfootball">TRYOUT TRAINING</a></li>
        <li><a href="/math-teacher/" class="nav-link" data-page="math">MATH</a></li>
        <li><a href="/game-22/" class="nav-link" data-page="super16">SUPER 16</a></li>
        <li><a href="/photos/" class="nav-link" data-page="photos">PHOTOS</a></li>
      </ul>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <script src="../js/auth-guard.js?v=1763735221&bust=v5"></script>

  <main class="app">
    <div id="header" class="photos-header">
      <h1>PHOTOS</h1>
    </div>

    <div class="photo-grid" id="photoGrid"></div>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">&#x2715;</button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script src="../js/navigation.js?v=1763735221&bust=v5"></script>
  <script>
    (function() {
      var grid = document.getElementById('photoGrid');
      var lightbox = document.getElementById('lightbox');
      var lightboxImg = document.getElementById('lightboxImg');
      var lightboxClose = document.getElementById('lightboxClose');

      function showPlaceholder() {
        var card = document.createElement('div');
        card.className = 'photo-card placeholder';
        card.innerHTML = '<div class="placeholder-icon">+</div><div class="placeholder-label">Add photos here</div>';
        grid.appendChild(card);
      }

      function buildCard(item) {
        var card = document.createElement('div');
        card.className = 'photo-card';

        var img = document.createElement('img');
        img.src = 'images/' + item.src;
        img.alt = item.caption || item.src;
        img.loading = 'lazy';

        var caption = document.createElement('div');
        caption.className = 'photo-caption';
        caption.textContent = item.caption || item.src;

        card.appendChild(img);
        card.appendChild(caption);

        card.addEventListener('click', function() {
          lightboxImg.src = 'images/' + item.src;
          lightboxImg.alt = item.caption || item.src;
          lightbox.classList.add('open');
        });

        return card;
      }

      function render(items) {
        grid.innerHTML = '';
        if (!items || items.length === 0) {
          showPlaceholder();
          return;
        }
        items.forEach(function(item) {
          grid.appendChild(buildCard(item));
        });
      }

      fetch('images/manifest.json?t=' + Date.now())
        .then(function(r) { return r.ok ? r.json() : []; })
        .catch(function() { return []; })
        .then(render);

      lightboxClose.addEventListener('click', function() {
        lightbox.classList.remove('open');
        lightboxImg.src = '';
      });
      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) {
          lightbox.classList.remove('open');
          lightboxImg.src = '';
        }
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          lightbox.classList.remove('open');
          lightboxImg.src = '';
        }
      });
    })();
  </script>
</body>
</html>
